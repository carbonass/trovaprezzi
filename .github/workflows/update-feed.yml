name: Aggiorna feed Trovaprezzi

on:
  schedule:
    - cron: "0 5 * * *"   # ogni giorno alle 05:00 UTC (~07:00 ora italiana)
  workflow_dispatch: {}    # permette anche l'avvio manuale da GitHub

jobs:
  update-feed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Genera feed
        env:
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
        run: python generate_feed.py feed/trovaprezzi_feed.csv

      - name: Commit e push se cambiato
        run: |
          git config user.name "trovaprezzi-feed-bot"
          git config user.email "actions@users.noreply.github.com"
          git add feed/trovaprezzi_feed.csv
          git diff --staged --quiet || git commit -m "Aggiorna feed Trovaprezzi $(date -u +%Y-%m-%d)"
          git push
